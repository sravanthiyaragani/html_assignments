<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Menu Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-card">

        <img src="restaurant.jpg" alt="Restaurant Image">

        <h1>Restaurant Menu</h1>

        <hr>

        <h2>Starters</h2>

        <div class="item">
            <span>Veg Manchuria</span>
            <span>₹120</span>
        </div>

        <div class="item">
            <span>Paneer Tikka</span>
            <span>₹180</span>
        </div>

        <h2>Main Course</h2>

        <div class="item">
            <span>Chicken Biryani</span>
            <span>₹250</span>
        </div>

        <div class="item">
            <span>Butter Naan</span>
            <span>₹40</span>
        </div>

        <h2>Desserts</h2>

        <div class="item">
            <span>Ice Cream</span>
            <span>₹90</span>
        </div>

        <div class="item">
            <span>Gulab Jamun</span>
            <span>₹70</span>
        </div>

        <h2>Beverages</h2>

        <div class="item">
            <span>Coffee</span>
            <span>₹60</span>
        </div>

        <div class="item">
            <span>Fresh Juice</span>
            <span>₹80</span>
        </div>

        <button>Order Now</button>

    </div>

</body>
</html>
