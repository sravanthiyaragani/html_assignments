<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Form</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;

    background:linear-gradient(to right,#4facfe,#00f2fe);
}

.Form-box{

    width:360px;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0px 0px 20px gray;

}

.profile{

    display:block;
    margin:auto;
    width:100px;
    height:100px;
    border-radius:50%;

}

h2{

    text-align:center;
    color:#0b5394;

}

.field{

    margin-top:15px;

}

.field img{

    width:20px;
    vertical-align:middle;
    margin-right:8px;

}

label{

    font-weight:bold;

}

input{

    width:100%;
    height:38px;
    margin-top:6px;
    padding-left:10px;
    border-radius:5px;
    border:1px solid gray;
    box-sizing:border-box;

}

button{

    width:100%;
    height:40px;
    margin-top:25px;

    background:#0b5394;

    color:white;

    border:none;

    border-radius:5px;

    font-size:16px;

    cursor:pointer;

}

button:hover{

    background:#073763;

}

</style>

</head>

<body>

<form action="file.html">

<div class="Form-box">

<img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
class="profile">

<h2>Login Form</h2>

<div class="field">

<img src="https://cdn-icons-png.flaticon.com/512/747/747376.png">

<label for="name">Username</label>

<input
type="text"
id="name"
name="name"
placeholder="Enter your username"
pattern="[A-Za-z ]+"
title="Username should contain only letters"
required>

</div>

<div class="field">

<img src="https://cdn-icons-png.flaticon.com/512/561/561127.png">

<label for="email">Email</label>

<input
type="email"
id="email"
name="email"
placeholder="Enter your email"
pattern="[a-zA-Z0-9._%+-]+@[a-zA-Z0-9.-]+\.(com|org|in|net|edu|gov|co\.in)$"
title="Email must end with .com, .org, .in, .net, .edu, .gov or .co.in"
required>

</div>

<div class="field">

<img src="https://cdn-icons-png.flaticon.com/512/724/724664.png">

<label for="mobile">Phone Number</label>

<input
type="tel"
id="mobile"
name="mobile"
placeholder="Enter your phone number"
pattern="[0-9]{10}"
maxlength="10"
title="Enter exactly 10 digits"
required>

</div>

<div class="field">

<img src="https://cdn-icons-png.flaticon.com/512/3064/3064155.png">

<label for="password">Password</label>

<input
type="password"
id="password"
name="password"
placeholder="Enter Password"
minlength="8"
required>

</div>

<button type="submit">

Login

</button>

</div>

</form>

</body>
</html>
